name: AI fix trigger

on:
  workflow_run:
    workflows: ["__CI_WORKFLOW_NAME__"]
    types:
      - completed

permissions:
  contents: write

jobs:
  prepare-error:
    # FIX: was 'self-hosted' — no self-hosted runner is registered in target repos.
    # Using ubuntu-22.04 (same as ai-workflows) for consistency.
    runs-on: ubuntu-22.04
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    outputs:
      error_logs: ${{ steps.capture.outputs.error }}

    steps:
      - name: Download logs
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          set -e
          RUN_ID=${{ github.event.workflow_run.id }}
          REPO=${{ github.event.workflow_run.repository.full_name }}
          # FIX: removed inline comment after backslash continuation (breaks shell)
          curl --http1.1 -L \
            --retry 3 \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/$REPO/actions/runs/$RUN_ID/logs" \
            -o logs.zip

      - name: Extract logs
        run: unzip -q logs.zip -d logs || true

      - name: Extract error
        id: capture
        run: |
          # FIX: replaced 'logs/**/*.txt' glob (unreliable without globstar)
          # with find to safely recurse into subdirectories
          ERROR=$(find logs -name "*.txt" -exec grep -Ei "error|exception|failed|__CI_FILE_NAME__" {} + | tail -n 200 || true)
          echo "error<<EOF" >> $GITHUB_OUTPUT
          echo "$ERROR" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  call-ai-fix:
    needs: prepare-error
    uses: Kallwik/ai-workflows/.github/workflows/ai-fix.yml@main
    with:
      error_log: ${{ needs.prepare-error.outputs.error_logs }}
      branch_name: ${{ github.event.workflow_run.head_branch }}
      ci_file_name: "__CI_FILE_NAME__"
    secrets:
      GCP_PCW_TOKEN: ${{ secrets.PAT_TOKEN }}
