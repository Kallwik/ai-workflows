name: AI fix trigger

on:
  workflow_run:
    workflows: ["__CI_WORKFLOW_NAME__"]
    types:
      - completed

permissions:
  contents: write

jobs:
  prepare-error:
    runs-on: ubuntu-22.04
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    outputs:
      error_logs: ${{ steps.capture.outputs.error }}

    steps:
      - name: Download logs
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          set -e
          RUN_ID=${{ github.event.workflow_run.id }}
          REPO=${{ github.event.workflow_run.repository.full_name }}
          curl --http1.1 -L \
            --retry 3 \
            -H "Authorization: Bearer $PAT_TOKEN" \
            "https://api.github.com/repos/$REPO/actions/runs/$RUN_ID/logs" \
            -o logs.zip

      - name: Extract logs
        run: unzip -q logs.zip -d logs || true

      - name: Extract error
        id: capture
        run: |
          ERROR=$(find logs -name "*.txt" -exec grep -Ei "error|exception|failed|__CI_FILE_NAME__" {} + | tail -n 200 || true)
          echo "error<<EOF" >> $GITHUB_OUTPUT
          echo "$ERROR" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  call-ai-fix:
    needs: prepare-error
    uses: Kallwik/ai-workflows/.github/workflows/ai-fix.yml@main
    with:
      error_log: ${{ needs.prepare-error.outputs.error_logs }}
      branch_name: ${{ github.event.workflow_run.head_branch }}
      ci_file_name: "__CI_FILE_NAME__"
      repo_full_name: ${{ github.repository }}
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
