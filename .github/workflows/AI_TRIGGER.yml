name: AI fix trigger
on:
  workflow_run:
    workflows: ["__CI_WORKFLOW_NAME__"]
    types:
      - completed

permissions:
  contents: write

jobs:
  prepare-error:
    runs-on: self-hosted
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    outputs:
      error_logs: ${{ steps.capture.outputs.error }}
    steps:
      - name: Download logs
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          RUN_ID=${{ github.event.workflow_run.id }}
          REPO=${{ github.event.workflow_run.repository.full_name }}
          curl --http1.1 -L \
            --retry 3 \
            -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/repos/$REPO/actions/runs/$RUN_ID/logs \  # FIX: action -> actions
            -o logs.zip

      - name: Extract logs
        run: unzip -q logs.zip -d logs || true

      - name: Extract error
        id: capture
        run: |
          ERROR=$(grep -Ei "error|exception|failed|__CI_FILE_NAME__" logs/**/*.txt | tail -n 200 || true)  # FIX: ture -> true
          echo "error<<EOF" >> $GITHUB_OUTPUT
          echo "$ERROR" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  call-ai-fix:
    needs: prepare-error
    uses: Kallwik/ai-workflows/.github/workflows/AI.yml@main
    with:
      error_log: ${{ needs.prepare-error.outputs.error_logs }}
      branch_name: ${{ github.event.workflow_run.head_branch }}
      ci_file_name: "__CI_FILE_NAME__"
    secrets:
      GCP_PCW_TOKEN: ${{ secrets.PAT_TOKEN }}

