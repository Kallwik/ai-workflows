name: AI fix pipline

on: 
 workflow_call:
  inputs:
    error_log:
     required: true
     type: string
    branch_name: 
     required: true
     type: string
    ci_file_name:
     required: true
     type: string
  secrets:
    GCP_PCW_TOKEN:
     required: true

permissions: 
 contents: write

jobs:
  process-error:
   runs-on: self-hosted

   steps:
     - name: Checkout repo
       uses: actions/checkout@v4
       with:
         persist-credentials: false

     - name: Prepare AI_FIX branch
       env:
         GH_TOKEN: ${{ secrets.GCP_PCW_TOKEN }}
         SOURCE_BRANCH: ${{ inputs.branch_name }}
       run: |
         git config user.name "AI_Bot"
         git config user.email "ai@bot.com"

         BRANCH="AI_FIX"
         REPO="${{ github.event.repository.full_name }}

         git remote set-url origin hhtps://x-access-token:$GH_TOKEN@github.com/$REPO.git
         git fetch origin 

         git checkout -B temp_branch origin/$SOURCE_BRANCH

         if git ls-remote --exit-code --heads origin $BRANCH; then
            git checkout $BRANCH
            git pull origin $BRANCH
            git merge temp_branch || echo "merge conflict ign ored"
         else
            git checkout -b $BRANCH temp_branch 
            echo "Created AI_FIX locally "
         fi
         
     - name: Configure GCP
       run: gcloud config set project gcpproject-490711
       
     - name: Setup Python
       uses: actions/setup-python@v5
       with:
          python-version: "3.11"
     - run: pip install google-cloud-aiplatfrom       
     
     # ✅ ANALYZE ERROR
     - name: Analyze CI Error (RAG)
       env:
         ERROR_LOG: ${{ inputs.error_log }}
       run: |
         cat > analyze.py <<'PY'
         import os
         import vertexai
         from vertexai.preview import rag
         from vertexai.generative_models import GenerativeModel, Tool

         vertexai.init(project="gcpproject-490711", location="us-central1")     
         CORPUS = "projects/gcpproject-490711/locations/asia-southeast1/ragCorpora/6917529027641081856"

         tool = Tool.from_retrieval(
             retrieval=rag.Retrieval(
                 source=rag.VertexRagStore(
                     rag_resources=[rag.RagResource(rag_corpus=CORPUS)]
                 )
             )
         )
         model = GenerativeModel("gemini-2.5-flash", tools=[tool])

         error = os.environ.get("ERROR_LOG", "")[:8000]
         
         prompt = f"""
         You are a CI debugging expert.
         Use RAG knowledge to explain the root cause.
         
         ERROR:
         {error}
         """
         
         res = model.generate_content(prompt)
         
         open("analysis.txt", "w").write(res.text)
         PY
         
         python analyze.py
         
      
