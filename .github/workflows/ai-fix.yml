name: AI fix pipeline

on:
  workflow_call:
    inputs:
      error_log:
        required: true
        type: string
      branch_name:
        required: true
        type: string
      ci_file_name:
        required: true
        type: string
      repo_full_name:
        required: true
        type: string
    secrets:
      PAT_TOKEN:
        required: true

permissions:
  contents: write
  id-token: write

jobs:
  process-error:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Prepare AI_FIX branch
        env:
          SOURCE_BRANCH: ${{ inputs.branch_name }}
        run: |
          git config user.name "AI_Bot"
          git config user.email "ai@bot.com"

          BRANCH="AI_FIX"

          git fetch origin
          git checkout -B temp_branch "origin/${SOURCE_BRANCH}"

          if git ls-remote --exit-code --heads origin $BRANCH; then
            git checkout $BRANCH
            git pull origin $BRANCH
            git merge temp_branch || echo "merge conflict ignored"
          else
            git checkout -b $BRANCH temp_branch
            echo "Created AI_FIX locally"
          fi

      # =========================
      # GCP AUTH
      # =========================

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure GCP Project
        run: gcloud config set project gcpproject-490711

      # =========================
      # PYTHON
      # =========================

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-cloud-aiplatform

      # =========================
      # ANALYZE ERROR
      # =========================

      - name: Analyze CI Error (RAG)
        env:
          ERROR_LOG: ${{ inputs.error_log }}
        run: |
          cat > analyze.py <<'PY'
          import os
          import vertexai
          from vertexai.preview import rag
          from vertexai.generative_models import GenerativeModel, Tool

          PROJECT_ID = "gcpproject-490711"
          LOCATION = "asia-southeast1"

          vertexai.init(
              project=PROJECT_ID,
              location=LOCATION
          )

          CORPUS = (
              "projects/gcpproject-490711/"
              "locations/asia-southeast1/"
              "ragCorpora/6917529027641081856"
          )

          print("Using corpus:", CORPUS)

          retrieval = rag.Retrieval(
              source=rag.VertexRagStore(
                  rag_resources=[
                      rag.RagResource(
                          rag_corpus=CORPUS
                      )
                  ]
              )
          )

          tool = Tool.from_retrieval(retrieval=retrieval)

          model = GenerativeModel(
              "gemini-2.5-flash",
              tools=[tool]
          )

          error = os.environ.get("ERROR_LOG", "")[:8000]

          print("ERROR length:", len(error))

          prompt = f"""
          You are a CI debugging expert.

          IMPORTANT:
          - You MUST use retrieved knowledge from RAG corpus
          - The corpus contains CI workflow, parameters, and templates
          - Mention what you retrieved and how it helped

          ERROR:
          {error}
          """

          print("Running analysis...")

          response = model.generate_content(prompt)

          print("\nRESPONSE:\n")
          print(response.text)

          with open("analysis.txt", "w") as f:
              f.write(response.text)
          PY

          python analyze.py

      # =========================
      # GENERATE FIX
      # =========================

      - name: Generate AI Fix
        env:
          CI_FILE: ${{ inputs.ci_file_name }}
        run: |
          cat > fix.py <<'PY'
          import os
          import re
          import sys
          import vertexai

          from vertexai.preview import rag
          from vertexai.generative_models import (
              GenerativeModel,
              Tool
          )

          PROJECT_ID = "gcpproject-490711"
          LOCATION = "asia-southeast1"

          vertexai.init(
              project=PROJECT_ID,
              location=LOCATION
          )

          ci_file = os.environ["CI_FILE"]

          path = f".github/workflows/{ci_file}"

          print("CI file:", path)

          if not os.path.exists(path):
              print("Workflow file not found")
              sys.exit(1)

          with open(path, "r") as f:
              current_ci = f.read()

          analysis = ""

          if os.path.exists("analysis.txt"):
              with open("analysis.txt", "r") as f:
                  analysis = f.read()

          CORPUS = (
              "projects/gcpproject-490711/"
              "locations/asia-southeast1/"
              "ragCorpora/6917529027641081856"
          )

          retrieval = rag.Retrieval(
              source=rag.VertexRagStore(
                  rag_resources=[
                      rag.RagResource(
                          rag_corpus=CORPUS
                      )
                  ]
              )
          )

          tool = Tool.from_retrieval(retrieval=retrieval)

          model = GenerativeModel(
              "gemini-2.5-flash",
              tools=[tool]
          )

          prompt = f"""
          You are a CI workflow fixer.

          ======================================
          CRITICAL INSTRUCTION (MANDATORY)
          ======================================

          Before generating the fix:
          1. Retrieve and read "rules.txt" from RAG corpus
          2. Treat rules.txt as strict schema validation
          3. Apply ALL rules from rules.txt

          ======================================
          CONSTRAINT MODE
          ======================================

          - If parameter is not allowed -> remove it
          - If uncertain -> DO NOT include it
          - NEVER include:
            - secret parameters
            - artifact credentials
            - internal action inputs

          ======================================
          WORKFLOW RULES
          ======================================

          - If using reusable workflow:
            - DO NOT include runs-on
            - DO NOT include steps

          - Preserve workflow structure
          - Fix only broken parts

          ======================================
          REQUIRED OUTPUT FORMAT
          ======================================

          ---FIXED_WORKFLOW---
          <YAML>
          ---END_FIXED_WORKFLOW---

          ---COMMIT_MESSAGE---
          <MESSAGE>
          ---END_COMMIT_MESSAGE---

          ======================================
          CURRENT CI
          ======================================

          {current_ci}

          ======================================
          ANALYSIS
          ======================================

          {analysis}
          """

          print("Generating fix...")

          response = model.generate_content(prompt)

          text = response.text.strip()

          print("\nRAW OUTPUT:\n")
          print(text)

          wf = re.search(
              r"---FIXED_WORKFLOW---([\s\S]+?)---END_FIXED_WORKFLOW---",
              text
          )

          msg = re.search(
              r"---COMMIT_MESSAGE---([\s\S]+?)---END_COMMIT_MESSAGE---",
              text
          )

          if not wf or not msg:
              print("Invalid AI response format")
              sys.exit(1)

          fixed_yaml = wf.group(1).strip()
          commit_message = msg.group(1).strip()

          with open(path, "w") as f:
              f.write(fixed_yaml)

          with open("commit.txt", "w") as f:
              f.write(commit_message)

          print("Fix applied successfully")
          PY

          python fix.py

      # =========================
      # COMMIT & PUSH
      # =========================

      - name: Commit and Push
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          REPO: ${{ inputs.repo_full_name }}
        run: |
          git remote set-url origin \
            "https://x-access-token:${PAT_TOKEN}@github.com/${REPO}.git"

          git add .github/workflows/*

          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -F commit.txt

          git push origin AI_FIX --force
