name: AI fix pipeline

on:
  workflow_call:
    inputs:
      error_log:
        required: true
        type: string
      branch_name:
        required: true
        type: string
      ci_file_name:
        required: true
        type: string
    secrets:
      GCP_PCW_TOKEN:
        required: true

permissions:
  contents: write

jobs:
  process-error:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Debug token
        env:
          GH_TOKEN: ${{ secrets.GCP_PCW_TOKEN }}
        run: |
          echo "Token length: ${#GH_TOKEN}"
          curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/user    

      - name: Prepare AI_FIX branch
        env:
          GH_TOKEN: ${{ secrets.GCP_PCW_TOKEN }}
          SOURCE_BRANCH: ${{ inputs.branch_name }}
          REPO: ${{ github.event.repository.full_name }}
        run: |
          git config user.name "AI_Bot"
          git config user.email "ai@bot.com"
      
          BRANCH="AI_FIX"
      
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"
          git fetch origin
      
          git checkout -B temp_branch origin/$SOURCE_BRANCH
      
          if git ls-remote --exit-code --heads origin $BRANCH; then
            git checkout $BRANCH
            git pull origin $BRANCH
            git merge temp_branch || echo "merge conflict ignored"
          else
            git checkout -b $BRANCH temp_branch
            echo "Created AI_FIX locally"
          fi
          
      - name: Configure GCP
        run: gcloud config set project gcpproject-490711

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install google-cloud-aiplatform  # FIX: typo aiplatfrom -> aiplatform

      # ANALYZE ERROR
      - name: Analyze CI Error (RAG)
        env:
          ERROR_LOG: ${{ inputs.error_log }}
        run: |
          cat > analyze.py <<'PY'
          import os
          import vertexai
          from vertexai.preview import rag
          from vertexai.generative_models import GenerativeModel, Tool

          vertexai.init(project="gcpproject-490711", location="us-central1")

          CORPUS = "projects/gcpproject-490711/locations/asia-southeast1/ragCorpora/6917529027641081856"

          retrieval = rag.Retrieval(
              source=rag.VertexRagStore(
                  rag_resources=[rag.RagResource(rag_corpus=CORPUS)]
              )
          )

          tool = Tool.from_retrieval(retrieval=retrieval)

          model = GenerativeModel("gemini-2.5-flash", tools=[tool])

          error = os.environ.get("ERROR_LOG", "")[:8000]

          print("ERROR length:", len(error))

          prompt = f"""
          You are a CI debugging expert.

          IMPORTANT:
          - You MUST use retrieved knowledge from RAG corpus
          - The corpus contains CI workflow, parameters, and templates
          - Mention what you retrieved and how it helped

          ERROR:
          {error}
          """

          print("Running analysis...")

          res = model.generate_content(prompt)

          print("\nRESPONSE:\n", res.text)  # FIX: res.txt -> res.text

          open("analysis.txt", "w").write(res.text)  # FIX: res.txt -> res.text
          PY
          python analyze.py

      - name: Generate AI Fix
        env:
          CI_FILE: ${{ inputs.ci_file_name }}
        run: |
          cat > fix.py <<'PY'
          import os, re, sys
          import vertexai
          from vertexai.preview import rag
          from vertexai.generative_models import GenerativeModel, Tool

          vertexai.init(project="gcpproject-490711", location="us-central1")

          ci_file = os.environ["CI_FILE"]
          path = f".github/workflows/{ci_file}"  # FIX: added closing quote on f-string

          print("CI file:", path)

          if not os.path.exists(path):
              print("File not found")
              sys.exit(1)

          current_ci = open(path).read()
          analysis = open("analysis.txt").read() if os.path.exists("analysis.txt") else ""

          # FIX: corrected corpus path (projects/locations/ragCorpora)
          CORPUS = "projects/gcpproject-490711/locations/asia-southeast1/ragCorpora/6917529027641081856"

          print("Corpus:", CORPUS)

          retrieval = rag.Retrieval(  # FIX: was missing opening parenthesis
              source=rag.VertexRagStore(
                  rag_resources=[rag.RagResource(rag_corpus=CORPUS)]
              )
          )

          tool = Tool.from_retrieval(retrieval=retrieval)

          model = GenerativeModel("gemini-2.5-flash", tools=[tool])  # FIX: added missing opening quote

          prompt = f"""
          You are a CI workflow fixer.

          ======================================
          CRITICAL INSTRUCTION (MANDATORY)
          ======================================

          Before generating the fix:
          1. You must retrieve and read the file named "rules.txt" from the RAG corpus.
          2. Treat rules.txt as a strict VALIDATION SCHEMA.
          3. You MUST apply ALL the rules from rules.txt.

          ======================================
          CONSTRAINT MODE
          ======================================
          - If parameter is not allowed -> remove it
          - If uncertain -> DO NOT include it
          - NEVER include:
            - secret parameters
            - artifact credentials
            - internal action inputs

          =========================================
          WORKFLOW RULES
          =========================================

          - If using reusable workflow
            -> DO NOT include runs-on
            -> DO NOT include steps
          - Preserve structure
          - Fix only the broken parts

          ===========================================

          FORMAT:

          ---FIXED_WORKFLOW---
          <YAML>
          ---END_FIXED_WORKFLOW---

          ---COMMIT_MESSAGE---
          <MSG>
          ---END_COMMIT_MESSAGE---

          Current CI:
          {current_ci}

          ANALYSIS:
          {analysis}
          """

          print("Generating fix...")

          response = model.generate_content(prompt)  # FIX: typo reponse -> response
          text = response.text.strip()

          print("\nRAW OUTPUT\n", text)

          # FIX: regex pattern (.#?) -> ([\s\S]+?) to correctly capture multiline content
          wf = re.search(r"---FIXED_WORKFLOW---([\s\S]+?)---END_FIXED_WORKFLOW---", text)
          msg = re.search(r"---COMMIT_MESSAGE---([\s\S]+?)---END_COMMIT_MESSAGE---", text)

          if not wf or not msg:
              print("Invalid output from AI")  # FIX: typo Invaild -> Invalid
              sys.exit(1)

          fixed_yaml = wf.group(1).strip()

          open(path, "w").write(fixed_yaml)
          open("commit.txt", "w").write(msg.group(1).strip())

          print("Fix applied successfully")  # FIX: typo seccessfully -> successfully
          PY

          python fix.py

      - name: Commit and Push
        env:
          GH_TOKEN: ${{ secrets.GCP_PCW_TOKEN }}
          REPO: ${{ github.event.repository.full_name }}
        run: |
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"
          git add .github/workflows/*
          git commit -F commit.txt || echo "no changes"
          git push origin AI_FIX
